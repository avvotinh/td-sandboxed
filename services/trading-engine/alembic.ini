# Alembic config for the Sandboxed trading engine
#
# Story 10.10 — port 6 raw migrations (005-010) into Alembic so future
# schema changes flow through `alembic revision` rather than ad-hoc SQL.
# `infra/timescaledb/init.sql` remains the bootstrap baseline that
# brings up the core tables; revisions in this directory build on top.
#
# Bootstrap path:
#   - Existing DB (already has 005-010 applied via ``psql -f``):
#       alembic stamp 010_rename_ftmo_audit_events
#   - Fresh DB (after `psql -f infra/timescaledb/init.sql`):
#       alembic upgrade head
#
# `sqlalchemy.url` reads from the ``DATABASE_URL`` environment variable
# at runtime (see alembic/env.py). The empty placeholder below keeps
# alembic happy when it parses the config without an env override.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
sqlalchemy.url =
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 60

# Disable autogenerate — every revision is hand-written so we can
# emit TimescaleDB DDL (hypertables, retention policies, continuous
# aggregates) that SQLAlchemy's autogen comparator does not know how
# to produce.
[alembic:exclude]
tables = alembic_version

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
