# Sandboxed Trading System - Infrastructure Stack
# Docker Compose Variable Precedence (highest to lowest):
# 1. Shell environment variables (export VAR=value)
# 2. Values in compose.yml environment: section
#
# Usage: export POSTGRES_PASSWORD=yourpassword && docker compose up -d
# Or source configs/dev/.env before running docker compose
#
# Each service only receives the environment variables it needs (principle of least privilege)

services:
  # Redis - Hot storage for latest ticks and real-time data
  redis:
    image: redis:7-alpine
    container_name: trading-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ../redis/redis.conf:/usr/local/etc/redis/redis.conf:ro,z
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    networks:
      - trading-net

  # TimescaleDB - Time-series data storage (PostgreSQL 16+)
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: trading-timescaledb
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading}
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ../timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading} -d ${POSTGRES_DB:-trading}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - trading-net
    shm_size: 256mb

  # ================== APPLICATION SERVICES ==================

  # TV-API - TradingView data collector (Go)
  tv-api:
    build:
      context: ../../services/tv-api
      dockerfile: Dockerfile
    container_name: trading-tv-api
    environment:
      REDIS_URL: redis:6379
      TIMESCALE_URL: postgres://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-devpassword}@timescaledb:5432/${POSTGRES_DB:-trading}
      SESSION_ID: ${SESSION_ID:-}
      SESSION_SIGN: ${SESSION_SIGN:-}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - trading-net
    restart: unless-stopped

  # MT5-Bridge - MetaTrader 5 ZeroMQ bridge (Rust)
  mt5-bridge:
    build:
      context: ../../services/mt5-bridge
      dockerfile: Dockerfile
    container_name: trading-mt5-bridge
    ports:
      - "5555:5555"  # REQ/REP with MT5 EA
      - "5556:5556"  # PUB tick data
      - "5557:5557"  # SUB order commands
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      ZMQ_REQ_PORT: 5555
      ZMQ_PUB_PORT: 5556
      ZMQ_SUB_PORT: 5557
    networks:
      - trading-net
    restart: unless-stopped

  # Trading-Engine - NautilusTrader-based engine (Python)
  trading-engine:
    build:
      context: ../../services/trading-engine
      dockerfile: Dockerfile
    container_name: trading-engine
    environment:
      REDIS_URL: redis://redis:6379
      TIMESCALE_URL: postgres://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-devpassword}@timescaledb:5432/${POSTGRES_DB:-trading}
      ZMQ_BRIDGE_HOST: mt5-bridge
      ZMQ_PUB_PORT: 5556
      ZMQ_SUB_PORT: 5557
      TRADING_MODE: ${TRADING_MODE:-paper}
      PYTHONUNBUFFERED: 1
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      mt5-bridge:
        condition: service_started
    volumes:
      - engine_data:/app/data
    networks:
      - trading-net
    restart: unless-stopped

  # Notification - Telegram notification bot (Go)
  notification:
    build:
      context: ../../services/notification
      dockerfile: Dockerfile
    container_name: trading-notification
    environment:
      REDIS_URL: redis:6379
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      NOTIFICATION_LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - trading-net
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  timescale_data:
    driver: local
  engine_data:
    driver: local

networks:
  trading-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
